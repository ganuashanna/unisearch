<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | UniSearch Dr. BAMU</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex flex-col md:flex-row shadow-2xl overflow-hidden">
    <!-- Left: Branding -->
    <div class="md:w-1/2 relative bg-navy overflow-hidden flex flex-col items-center justify-center p-12 text-center text-white">
        <div class="absolute inset-0 z-0 bg-cover bg-center opacity-25" 
             style="background-image: url('/assets/img/campus-hero.jpg');">
        </div>
        <div class="absolute inset-0 z-10 bg-navy opacity-80"></div>
        
        <div class="relative z-20 space-y-8 max-w-lg">
            <img src="/assets/img/bamu-logo.png" alt="BAMU Logo" class="h-24 mx-auto mb-4 filter brightness-125">
            <h2 class="text-2xl font-black leading-tight uppercase tracking-widest">
                Dr. Babasaheb Ambedkar Marathwada University
            </h2>
            <p class="text-gray-300 font-medium">Chhatrapati Sambhajinagar, Maharashtra</p>
            
            <!-- VC Photo -->
            <div class="mt-8">
                <img src="/assets/img/vc-photo.jpg" 
                     class="h-32 w-32 rounded-full border-4 border-orange mx-auto shadow-2xl object-cover" 
                     alt="Vice Chancellor">
                <p class="mt-4 font-bold text-sm">Prof. (Dr.) Vijay Fulari</p>
                <p class="text-xs text-orange font-bold uppercase tracking-wider">Vice Chancellor</p>
            </div>
            
            <div class="flex justify-center gap-6 mt-12 bg-white/10 p-4 rounded-xl backdrop-blur-md">
                <img src="/assets/img/naac-grade.png" class="h-14" alt="NAAC">
                <img src="/assets/img/nirf-ranking.png" class="h-14" alt="NIRF">
            </div>
        </div>
    </div>

    <!-- Right: Login Form -->
    <div class="md:w-1/2 bg-white flex items-center justify-center p-12">
        <div id="loginCard" class="w-full max-w-sm space-y-8 animate-fade-in">
            <div class="text-center">
                <div class="w-16 h-16 bg-blue-50 text-navy rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
                    <i class="fa fa-lock"></i>
                </div>
                <h1 class="text-3xl font-black text-navy">Admin Portal</h1>
                <p class="text-gray-500 font-medium mt-1">UniSearch Administration System</p>
            </div>

            <div class="space-y-6">
                <div>
                   <label class="text-xs font-black text-gray-400 uppercase tracking-widest block mb-2">Admin Password</label>
                   <div class="relative">
                      <input type="password" id="passwordInput" 
                        class="w-full h-14 bg-gray-50 border-2 border-gray-100 rounded-xl px-5 text-navy font-bold focus:border-orange focus:bg-white outline-none transition-all pr-12"
                        placeholder="********">
                      <button onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-navy transition-colors">
                        <i id="eyeIcon" class="fa fa-eye"></i>
                      </button>
                   </div>
                </div>

                <div id="loginError" class="hidden p-4 bg-red-50 text-red-600 rounded-xl text-xs font-bold border border-red-100 flex items-center gap-3">
                   <i class="fa fa-exclamation-circle"></i>
                   <span id="loginErrorMsg">Invalid password. Please try again.</span>
                </div>

                <button id="loginBtn" onclick="doLogin()" 
                    class="w-full h-14 bg-navy text-white rounded-xl font-bold hover:bg-orange transition-all shadow-xl shadow-navy/20 flex items-center justify-center gap-3">
                    <i class="fa fa-sign-in-alt"></i> Sign In
                </button>
            </div>

            <div class="text-center">
                <a href="/" class="text-sm font-bold text-navy hover:text-orange transition-colors">
                    <i class="fa fa-arrow-left mr-2"></i> Back to Main Search
                </a>
            </div>
            
            <p class="text-center text-[10px] text-gray-400 font-bold uppercase tracking-widest pt-12 border-t border-gray-100">
                &copy; Dr. BAMU UniSearch &bull; System V2.0
            </p>
        </div>
    </div>
</div>

<script>
// Auth guard - if already logged in, go to dashboard
if (localStorage.getItem('uni_admin_token')) {
  window.location.href = '/dashboard';
}

async function doLogin() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginError');
  const pwd = document.getElementById('passwordInput').value.trim();

  if (!pwd) { showError('Please enter your password'); return; }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Signing in...';
  if (err) err.style.display = 'none';

  try {
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });

    const text = await response.text();
    let data = {};
    try { data = JSON.parse(text); } catch(e) { data = { error: text }; }

    if (response.ok && data.token) {
      localStorage.setItem('uni_admin_token', data.token);
      window.location.href = '/dashboard';
    } else {
      showError(data.error || 'Login failed. Check password.');
      const card = document.getElementById('loginCard');
      if (card) {
        card.style.animation = 'shake 0.4s ease';
        setTimeout(() => card.style.animation = '', 500);
      }
    }
  } catch(e) {
    showError('Network error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-sign-in-alt"></i> Sign In';
  }
}

function showError(msg) {
  const err = document.getElementById('loginError');
  if (err) { err.textContent = msg; err.style.display = 'block'; }
}

function togglePassword() {
  const inp  = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  if (icon) icon.className = inp.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
}

document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('passwordInput');
  if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});
</script>

<style>
@keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.animate-fade-in { animation: fade-in 0.4s ease forwards; }

@keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-8px); } 50% { transform: translateX(8px); } }
.animate-shake { animation: shake 0.4s ease; }
</style>

</body>
</html>
